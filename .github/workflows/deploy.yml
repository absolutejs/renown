name: Deploy

# Continuous deployment for Renown. origin/main is the single source of truth for
# what runs on the droplet, so "what's live" can't drift from the repo.
#
#   push to main → typecheck (hard gate) → sync code to droplet → seed catalog →
#                  compile on the droplet → atomic swap + smoke + auto-rollback
#
# Why compile ON the droplet (not the runner): `absolute compile` boots the server
# to pre-render, and the `networking()` server auto-listens — on the runner this
# collides with the pre-render harness on port 3000 (EADDRINUSE). On the droplet we
# free 3000 first (stop the service), so pre-render gets the port cleanly. The box
# is 1 GB + 2 GB swap and compiles in seconds. Downtime = compile duration (~1 min);
# if anything fails the old binary is restored.
#
# Required repo secret:
#   ABSOLUTEJS_SSH_KEY — private key authorized as root@ on the droplet
#                        (the local ~/.ssh/absolutejs_droplet key).

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  HOST: 159.89.87.74
  APP_DIR: /srv/renown

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (for typecheck)
        run: bun install --frozen-lockfile

      - name: Typecheck (hard gate — blocks every deploy)
        run: bun run typecheck

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ABSOLUTEJS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Sync code to droplet (keeps the droplet's own .env)
        run: |
          rsync -az --delete \
            --exclude='.git' --exclude='node_modules' --exclude='web/node_modules' \
            --exclude='web/dist' --exclude='web/build' --exclude='.env' --exclude='web/.env' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ "root@${HOST}:${APP_DIR}/"

      - name: Seed catalog + compile + atomic swap + smoke + rollback (on droplet)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${HOST}" "APP_DIR=${APP_DIR} bash -s" <<'EOSSH'
          set -euo pipefail
          APP_DIR="${APP_DIR:-/srv/renown}"
          chown -R renown:renown "$APP_DIR"

          # Install deps + seed the achievement catalog (idempotent; reads DATABASE_URL
          # from the droplet's web/.env). No schema migration here — renown schema is
          # managed manually via db:push.
          sudo -u renown -H bash -lc "export PATH=\$HOME/.bun/bin:\$PATH; cd '$APP_DIR' && bun install --frozen-lockfile && bun --env-file=web/.env db/seed.ts && cd web && bun install --frozen-lockfile"

          cd "$APP_DIR/web"
          TS=$(date +%Y%m%d-%H%M%S)
          [ -f compiled-server ] && cp -a compiled-server "compiled-server.bak-$TS" || true

          # Free port 3000 so `absolute compile` pre-render can bind it, then build.
          systemctl stop renown || true
          if ! sudo -u renown -H bash -lc "export PATH=\$HOME/.bun/bin:\$PATH; cd '$APP_DIR/web' && bunx absolute compile --outfile '$APP_DIR/web/compiled-server.new'" || [ ! -f compiled-server.new ]; then
            echo '::error::compile failed — restoring previous binary'
            systemctl start renown || true
            exit 1
          fi

          mv compiled-server.new compiled-server
          chown renown:renown compiled-server && chmod 755 compiled-server
          systemctl start renown && sleep 5

          A=$(systemctl is-active renown || echo inactive)
          C=$(curl -sS -m 15 -o /dev/null -w '%{http_code}' http://127.0.0.1:3000 || echo 000)
          echo "active=$A app=$C (backup compiled-server.bak-$TS)"
          if [ "$A" != active ] || [ "$C" != 200 ]; then
            echo '!!! SMOKE FAILED — rolling back !!!'
            if [ -f "compiled-server.bak-$TS" ]; then systemctl stop renown; cp -a "compiled-server.bak-$TS" compiled-server; systemctl start renown; sleep 4; fi
            echo "rolled back: active=$(systemctl is-active renown || echo inactive)"
            exit 1
          fi

          # Keep the 2 newest backups + drop stale AbsoluteJS /tmp runtime extracts.
          ls -t compiled-server.bak-* 2>/dev/null | tail -n +3 | xargs -r rm -f
          ls -dt /tmp/absolutejs-compiled-runtime-* 2>/dev/null | tail -n +3 | xargs -r rm -rf
          echo "deploy ok"
          EOSSH
          echo "deployed ${{ github.sha }} → renown.absolutejs.com"
