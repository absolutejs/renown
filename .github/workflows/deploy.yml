name: Deploy

# Continuous deployment for Renown. origin/main is the single source of truth for
# what runs on the droplet.
#
#   push to main → typecheck → seed catalog → pull droplet env → compile ON THE
#                  RUNNER → scp binary → atomic swap + smoke + auto-rollback
#
# Compile on the runner (lots of RAM), NOT the droplet — the droplet only runs the
# binary. The droplet's /srv/renown/web/.env is pulled and baked at build time so
# prod config is correct. No PORT is set for the compile: `absolute compile`
# (>=0.19.0-beta.1077) picks a free pre-render port itself (findFreePort), so it
# never collides on the runner.
#
# Required repo secret:
#   ABSOLUTEJS_SSH_KEY — private key authorized as root@ on the droplet.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  HOST: 159.89.87.74
  APP_DIR: /srv/renown/web

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (root + web)
        run: |
          bun install --frozen-lockfile
          cd web && bun install --frozen-lockfile

      - name: Typecheck (hard gate — blocks every deploy)
        run: bun run typecheck

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ABSOLUTEJS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Pull droplet env (bakes prod config at build time)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${HOST}" \
            "cat ${APP_DIR}/.env" > web/.env
          test -s web/.env || { echo "::error::could not read ${HOST}:${APP_DIR}/.env"; exit 1; }

      - name: Seed achievement catalog (idempotent)
        run: bun --env-file=web/.env db/seed.ts

      - name: Migrate serialized pet issuance (idempotent)
        run: bun --env-file=web/.env db/migrate-serialized-pets.ts

      - name: Compile standalone binary (no PORT → absolute picks a free pre-render port)
        run: |
          cd web && bunx absolute compile --outfile "$GITHUB_WORKSPACE/compiled-server"
          test -f "$GITHUB_WORKSPACE/compiled-server" || { echo "::error::no compiled-server produced"; exit 1; }
          echo "artifact: $(stat -c %s "$GITHUB_WORKSPACE/compiled-server") bytes"

      - name: Ship — checksum + backup + atomic swap + smoke + auto-rollback
        run: |
          set -euo pipefail
          SHA="$(sha256sum compiled-server | cut -c1-16)"
          echo "shipping sha=${SHA} → renown (${HOST})"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${HOST}" \
            "cd ${APP_DIR} && rm -f compiled-server.new && ls -t compiled-server.bak-* 2>/dev/null | tail -n +2 | xargs -r rm -f"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            compiled-server "root@${HOST}:${APP_DIR}/compiled-server.new"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${HOST}" "
            set -e
            cd ${APP_DIR}
            GOT=\$(sha256sum compiled-server.new | cut -c1-16)
            if [ \"\$GOT\" != \"${SHA}\" ]; then echo 'CHECKSUM MISMATCH — aborting'; rm -f compiled-server.new; exit 1; fi
            TS=\$(date +%Y%m%d-%H%M%S)
            [ -f compiled-server ] && cp -a compiled-server \"compiled-server.bak-\$TS\" || true
            systemctl stop renown
            mv compiled-server.new compiled-server
            chown renown:renown compiled-server && chmod 755 compiled-server
            systemctl start renown && sleep 5
            A=\$(systemctl is-active renown); C=\$(curl -sS -m 15 -o /dev/null -w '%{http_code}' http://127.0.0.1:3000 || echo 000)
            echo \"active=\$A app=\$C (backup compiled-server.bak-\$TS)\"
            if [ \"\$A\" != active ] || [ \"\$C\" != 200 ]; then
              echo '!!! SMOKE FAILED — rolling back !!!'
              if [ -f \"compiled-server.bak-\$TS\" ]; then systemctl stop renown; cp -a \"compiled-server.bak-\$TS\" compiled-server; systemctl start renown; sleep 4; fi
              echo \"rolled back: active=\$(systemctl is-active renown)\"; exit 1
            fi
            { ls -t compiled-server.bak-* 2>/dev/null | tail -n +3 | xargs -r rm -f; } || true
            { ls -dt /tmp/absolutejs-compiled-runtime-* 2>/dev/null | tail -n +3 | xargs -r rm -rf; } || true
          "
          echo "deployed ${{ github.sha }} → renown.absolutejs.com"
